name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare files
        run: |
          mkdir -p build
          cp -r ui/* build/ 2>/dev/null || true
          cp index.html style.css app.js build/ 2>/dev/null || true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: 'build'
      - uses: actions/deploy-pages@v4
